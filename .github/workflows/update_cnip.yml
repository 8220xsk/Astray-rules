name: Update MikroTik CNIP List

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 0:00 自动更新
  workflow_dispatch:      # 允许你点击按钮手动立即运行

jobs:
  update_list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process IP Data
        run: |
          # 创建存放目录
          mkdir -p list/Other/
          
          # 1. 抓取原始数据
          curl -s https://www.iwik.org/ipcountry/mikrotik/CN -o raw_data.txt
          
          # 2. 初始化 cnip.rsc 并写入首行和清理指令
          echo "/ip firewall address-list" > cnip.rsc
          echo "remove [/ip firewall address-list find list=CNIP]" >> cnip.rsc
          
          # 3. 添加你要求的私有网段
          echo "add address=192.168.0.0/16 list=CNIP comment=private-network" >> cnip.rsc
          echo "add address=10.0.0.0/8 list=CNIP comment=private-network" >> cnip.rsc
          
          # 4. 转换原始数据格式并追加
          # 逻辑：去除 do{...} 结构，并将 list=CN 统一改为 list=CNIP
          sed -E 's/do \{ (.*) \} on-error=\{}/\1/' raw_data.txt | sed 's/list=CN/list=CNIP/g' >> cnip.rsc
          
          # 5. 移动到目标路径
          mv cnip.rsc list/Other/cnip.rsc

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add list/Other/cnip.rsc
          # 只有在文件内容确实有变化时才提交，避免刷版本号
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update CNIP list" && git push)
