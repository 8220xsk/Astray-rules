name: Update MikroTik CNIP List

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update_list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process IP Data
        run: |
          mkdir -p list/Other/
          curl -s https://www.iwik.org/ipcountry/mikrotik/CN -o raw_data.txt
          
          # 1. 写入头部信息
          echo "/ip firewall address-list" > cnip.rsc
          echo "remove [/ip firewall address-list find list=CNIP]" >> cnip.rsc
          echo "add address=192.168.0.0/16 list=CNIP comment=private-network" >> cnip.rsc
          echo "add address=10.0.0.0/8 list=CNIP comment=private-network" >> cnip.rsc
          
          # 2. 提取并清洗数据
          # grep: 只保留包含 'add address=' 的行
          # sed 's/^://': 删掉行首的冒号
          # sed 's/do \{ (.*) \} on-error=\{}/\1/': 剥离 do{...}
          # sed 's/list=CN/list=CNIP/g': 替换列表名称
          grep "add address=" raw_data.txt | sed 's/^://' | sed -E 's/do \{ (.*) \} on-error=\{}/\1/' | sed 's/list=CN/list=CNIP/g' >> cnip.rsc
          
          mv cnip.rsc list/Other/cnip.rsc

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add list/Other/cnip.rsc
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update CNIP: removed leading colon" && git push)
